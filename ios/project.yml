name: MitiMaiti
options:
  bundleIdPrefix: com.mitimaiti
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    INFOPLIST_KEY_CFBundleDisplayName: "MitiMaiti"
    INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.social-networking"
    MARKETING_VERSION: "2.0.0"
    CURRENT_PROJECT_VERSION: "1"
    ASSETCATALOG_COMPILER_APPICON_NAME: "AppIcon"
    ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: "AccentColor"
    DEVELOPMENT_TEAM: "W6SV85SWKS"
    CODE_SIGN_STYLE: "Automatic"
packages:
  SocketIO:
    url: https://github.com/socketio/socket.io-client-swift
    from: 16.1.0
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: 9.1.0
targets:
  MitiMaiti:
    type: application
    platform: iOS
    sources:
      - path: MitiMaiti
        excludes:
          - "**/.DS_Store"
    dependencies:
      - package: SocketIO
        product: SocketIO
      - package: GoogleSignIn
        product: GoogleSignIn
      - package: GoogleSignIn
        product: GoogleSignInSwift
    settings:
      base:
        CODE_SIGN_ENTITLEMENTS: MitiMaiti/MitiMaiti.entitlements
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_UIStatusBarStyle: "UIStatusBarStyleLightContent"
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "MitiMaiti uses your microphone so you can record voice messages in chat."
        INFOPLIST_KEY_NSCameraUsageDescription: "MitiMaiti uses your camera so you can take live photos to send in chat."
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "MitiMaiti uses your photo library so you can pick photos to send in chat."
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "MitiMaiti uses your location to find nearby Sindhi matches in your area."
        GENERATE_INFOPLIST_FILE: true
